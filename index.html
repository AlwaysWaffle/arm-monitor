<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>monitor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0d0d0d;
  --line: rgba(255,255,255,0.07);
  --muted: rgba(255,255,255,0.25);
  --text: rgba(255,255,255,0.9);
  --accent: #5affa0;
  --accent-rgb: 90, 255, 160;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  padding: 48px 24px 80px;
  transition: --accent 1s;
}

.page { max-width: 720px; margin: 0 auto; }

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 64px;
}

.wordmark {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  font-weight: 400;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
}

.status {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--muted);
  letter-spacing: 0.1em;
}

.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  transition: background 1s;
}
.dot.dead { background: #444; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.dot:not(.dead) { animation: pulse 2s infinite; }

/* Main metric */
.hero {
  margin-bottom: 56px;
  border-bottom: 1px solid var(--line);
  padding-bottom: 40px;
}

.hero-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 16px;
}

.hero-value {
  font-size: clamp(5rem, 18vw, 9rem);
  font-weight: 300;
  letter-spacing: -0.04em;
  line-height: 0.85;
  color: var(--accent);
  transition: color 1s;
  font-variant-numeric: tabular-nums;
}

.hero-unit {
  font-size: 0.3em;
  font-weight: 400;
  opacity: 0.5;
  vertical-align: super;
}

.hero-sub {
  margin-top: 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--muted);
}

/* Rows */
.rows { display: flex; flex-direction: column; }

.row {
  display: grid;
  grid-template-columns: 140px 1fr auto;
  align-items: center;
  gap: 24px;
  padding: 20px 0;
  border-bottom: 1px solid var(--line);
}

.row-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
}

.bar-track {
  height: 1px;
  background: var(--line);
  position: relative;
}

.bar-fill {
  position: absolute;
  top: 0; left: 0;
  height: 100%;
  background: var(--accent);
  transition: width 1.2s cubic-bezier(.4,0,.2,1), background 1s;
  width: 0;
}

.row-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  min-width: 60px;
  text-align: right;
}

/* Uptime */
.uptime-row {
  padding: 24px 0 0;
  display: flex;
  gap: 40px;
}

.up-item {}
.up-num {
  font-size: 2rem;
  font-weight: 300;
  letter-spacing: -0.03em;
  color: var(--accent);
  transition: color 1s;
  font-variant-numeric: tabular-nums;
}
.up-lbl {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 4px;
}

/* Footer */
footer {
  margin-top: 48px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
}

.foot-txt {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.62rem;
  color: var(--muted);
  line-height: 1.8;
  letter-spacing: 0.05em;
}

.foot-txt b { color: rgba(255,255,255,0.5); font-weight: 400; }

.btn {
  background: none;
  border: 1px solid var(--line);
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.62rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 10px 18px;
  border-radius: 4px;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }

@media(max-width: 480px) {
  .row { grid-template-columns: 90px 1fr auto; gap: 12px; }
  .hero-value { font-size: 5rem; }
}
</style>
</head>
<body>
<div class="page">

  <header class="header">
    <div class="wordmark">arm · monitor</div>
    <div class="status">
      <div class="dot dead" id="dot"></div>
      <span id="statusTxt">—</span>
    </div>
  </header>

  <!-- Hero: CPU -->
  <div class="hero">
    <div class="hero-label">cpu load</div>
    <div class="hero-value" id="heroVal">—<span class="hero-unit">%</span></div>
    <div class="hero-sub" id="heroSub">ожидание данных...</div>
  </div>

  <!-- Rows -->
  <div class="rows">
    <div class="row">
      <div class="row-label">память</div>
      <div class="bar-track"><div class="bar-fill" id="ramBar"></div></div>
      <div class="row-val" id="ramVal">—</div>
    </div>
    <div class="row">
      <div class="row-label">диск</div>
      <div class="bar-track"><div class="bar-fill" id="diskBar"></div></div>
      <div class="row-val" id="diskVal">—</div>
    </div>
    <div class="row">
      <div class="row-label">температура</div>
      <div class="bar-track"><div class="bar-fill" id="tempBar"></div></div>
      <div class="row-val" id="tempVal">—</div>
    </div>

    <div class="uptime-row">
      <div class="up-item">
        <div class="up-num" id="upD">—</div>
        <div class="up-lbl">дней</div>
      </div>
      <div class="up-item">
        <div class="up-num" id="upH">—</div>
        <div class="up-lbl">часов</div>
      </div>
      <div class="up-item">
        <div class="up-num" id="upM">—</div>
        <div class="up-lbl">минут</div>
      </div>
    </div>
  </div>

  <footer>
    <div class="foot-txt">
      <div>обновлено <b id="lastUpd">—</b></div>
      <div>следующее через <b id="cd">120</b> с</div>
    </div>
    <button class="btn" onclick="load()">↻ refresh</button>
  </footer>

</div>
<script>
const REPO = 'AlwaysWaffle/arm-monitor';
let cd = 120;

function getAccent(cpu, temp) {
  const stress = Math.max(cpu, temp / 100 * 100);
  if (stress >= 85) return '#ff5252';
  if (stress >= 65) return '#ffb74d';
  return '#5affa0';
}

function setAccent(color) {
  document.documentElement.style.setProperty('--accent', color);
}

function setBar(id, pct) {
  document.getElementById(id).style.width = Math.min(pct, 100) + '%';
}

async function load() {
  try {
    const r = await fetch(`https://raw.githubusercontent.com/${REPO}/main/stats.json?t=${Date.now()}`);
    if (!r.ok) throw 0;
    const d = await r.json();

    const ramPct = Math.round(d.ram_used / d.ram_total * 100);
    const accent = getAccent(d.cpu, d.temp);
    setAccent(accent);

    document.getElementById('heroVal').innerHTML = d.cpu + '<span class="hero-unit">%</span>';
    document.getElementById('heroSub').textContent =
      'ram ' + ramPct + '% · temp ' + d.temp + '°C · disk ' + d.disk_pct + '%';

    setBar('ramBar', ramPct);
    setBar('diskBar', d.disk_pct);
    setBar('tempBar', d.temp);

    document.getElementById('ramVal').textContent = ramPct + '%';
    document.getElementById('diskVal').textContent = d.disk_pct + '% · ' + d.disk_free + ' free';
    document.getElementById('tempVal').textContent = d.temp + '°C';

    const s = d.uptime_sec;
    document.getElementById('upD').textContent = Math.floor(s / 86400);
    document.getElementById('upH').textContent = Math.floor(s % 86400 / 3600);
    document.getElementById('upM').textContent = Math.floor(s % 3600 / 60);

    const dt = new Date(d.timestamp * 1000);
    document.getElementById('lastUpd').textContent = dt.toLocaleTimeString('ru');

    document.getElementById('dot').className = 'dot';
    document.getElementById('statusTxt').textContent = 'online';

  } catch(e) {
    document.getElementById('dot').className = 'dot dead';
    document.getElementById('statusTxt').textContent = 'offline';
  }
  cd = 120;
}

setInterval(() => {
  cd--;
  document.getElementById('cd').textContent = cd;
  if (cd <= 0) load();
}, 1000);

load();
</script>
</body>
</html>
