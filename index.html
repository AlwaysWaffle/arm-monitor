<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мониторинг | arm-monitor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0f1117;
  --card: #1a1d27;
  --border: #2a2d3a;
  --text: #e2e4ed;
  --muted: #6b7090;
  --accent: #22c55e;
  --tg: #0088cc;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 24px 16px 48px;
  transition: color 0.3s;
}

header {
  max-width: 700px;
  margin: 0 auto 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}

h1 { font-size: 20px; font-weight: 600; }
h1 span { color: var(--muted); font-weight: 400; font-size: 15px; margin-left: 8px; }

.header-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

#status-pill, #tg-link {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 6px 16px;
  transition: all .2s ease;
  text-decoration: none;
  color: var(--text);
}

#tg-link:hover {
  border-color: var(--tg);
  background: rgba(0,136,204,0.1);
  transform: translateY(-1px);
}

#tg-link svg { color: var(--tg); flex-shrink: 0; }

#status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--muted);
  transition: background .6s, box-shadow .6s;
  flex-shrink: 0;
}
#status-dot.online {
  background: var(--accent);
  box-shadow: 0 0 0 3px rgba(34,197,94,.15);
  animation: pulse 2s ease-in-out infinite;
}
#status-dot.offline {
  background: #ef4444;
  box-shadow: 0 0 0 3px rgba(239,68,68,.15);
  animation: none;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* Grid */
.grid {
  max-width: 700px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 14px;
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  transition: border-color .2s, transform .2s;
  position: relative;
  overflow: hidden;
}
.card:hover { border-color: #3a3f55; transform: translateY(-1px); }

/* Top accent line per card */
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 20px;
  width: 32px; height: 2px;
  border-radius: 0 0 3px 3px;
  background: var(--accent);
  transition: background .6s;
}

.card-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 10px;
}

.card-value {
  font-size: 38px;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 12px;
  color: var(--accent);
  transition: color .6s;
  font-variant-numeric: tabular-nums;
}

.bar-track {
  height: 4px;
  background: var(--border);
  border-radius: 999px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  border-radius: 999px;
  width: 0%;
  background: var(--accent);
  transition: width 1s ease, background .6s;
}

.card-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  margin-top: 8px;
}

/* Wide card (uptime row) */
.card.wide {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 0;
  padding: 20px 0;
}
.wide-item { flex: 1; min-width: 130px; padding: 0 20px; }
.wide-divider { width: 1px; height: 40px; background: var(--border); flex-shrink: 0; }
.wide-val {
  font-size: 18px;
  font-weight: 600;
  margin-top: 4px;
  font-variant-numeric: tabular-nums;
}

/* Skeleton */
.skeleton { animation: shimmer 1.5s ease-in-out infinite; }
@keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:.3} }

footer {
  max-width: 700px;
  margin: 20px auto 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  text-align: center;
  letter-spacing: 0.05em;
}

@media(max-width: 480px) {
  .card-value { font-size: 30px; }
}
</style>
</head>
<body>

<header>
  <h1>arm-monitor <span>мониторинг</span></h1>
  <div class="header-actions">
    <a href="https://t.me/" id="tg-link" target="_blank">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/>
      </svg>
      Telegram
    </a>
    <div id="status-pill">
      <div id="status-dot"></div>
      <span id="status-text">загрузка...</span>
    </div>
  </div>
</header>

<div class="grid">
  <div class="card">
    <div class="card-label">Процессор</div>
    <div class="card-value skeleton" id="cpu-val">—</div>
    <div class="bar-track"><div class="bar-fill" id="cpu-bar"></div></div>
    <div class="card-sub">нагрузка</div>
  </div>

  <div class="card">
    <div class="card-label">Оперативная память</div>
    <div class="card-value skeleton" id="ram-val">—</div>
    <div class="bar-track"><div class="bar-fill" id="ram-bar"></div></div>
    <div class="card-sub" id="ram-sub">—</div>
  </div>

  <div class="card">
    <div class="card-label">Температура</div>
    <div class="card-value skeleton" id="temp-val">—</div>
    <div class="bar-track"><div class="bar-fill" id="temp-bar"></div></div>
    <div class="card-sub">CPU</div>
  </div>

  <div class="card">
    <div class="card-label">Диск</div>
    <div class="card-value skeleton" id="disk-val">—</div>
    <div class="bar-track"><div class="bar-fill" id="disk-bar"></div></div>
    <div class="card-sub" id="disk-sub">—</div>
  </div>

  <div class="card wide">
    <div class="wide-item">
      <div class="card-label">Аптайм</div>
      <div class="wide-val skeleton" id="uptime-val">—</div>
    </div>
    <div class="wide-divider"></div>
    <div class="wide-item">
      <div class="card-label">Последнее обновление</div>
      <div class="wide-val skeleton" id="checked-val">—</div>
    </div>
    <div class="wide-divider"></div>
    <div class="wide-item">
      <div class="card-label">Следующее обновление</div>
      <div class="wide-val" id="next-val">через 120 с</div>
    </div>
  </div>
</div>

<footer>Данные обновляются каждые 120 секунд · stats.json из GitHub</footer>

<script>
const REPO = 'AlwaysWaffle/arm-monitor';
const REFRESH = 120;
let cd = REFRESH;

// Dynamic accent: green → amber → red
function accent(cpu, temp) {
  const v = Math.max(cpu, (temp / 100) * 100);
  if (v >= 85) return '#ef4444';
  if (v >= 60) return '#f59e0b';
  return '#22c55e';
}

function applyAccent(color) {
  document.documentElement.style.setProperty('--accent', color);
}

function setCard(valId, barId, pct, text) {
  const el = document.getElementById(valId);
  el.textContent = text;
  el.classList.remove('skeleton');
  document.getElementById(barId).style.width = Math.min(pct, 100) + '%';
}

function fmtUptime(sec) {
  const d = Math.floor(sec / 86400);
  const h = Math.floor(sec % 86400 / 3600);
  const m = Math.floor(sec % 3600 / 60);
  return (d > 0 ? d + 'д ' : '') + h + 'ч ' + m + 'мин';
}

function fmtTime(ts) {
  const d = new Date(ts * 1000);
  const p = n => String(n).padStart(2, '0');
  return p(d.getDate()) + '.' + p(d.getMonth()+1) + ' ' +
         p(d.getHours()) + ':' + p(d.getMinutes()) + ':' + p(d.getSeconds());
}

async function load() {
  try {
    const r = await fetch(`https://raw.githubusercontent.com/${REPO}/main/stats.json?t=${Date.now()}`);
    if (!r.ok) throw 0;
    const d = await r.json();

    const ramPct = Math.round(d.ram_used / d.ram_total * 100);
    const tempPct = Math.round((d.temp / 100) * 100);
    const col = accent(d.cpu, d.temp);
    applyAccent(col);

    setCard('cpu-val',  'cpu-bar',  d.cpu,     d.cpu + '%');
    setCard('ram-val',  'ram-bar',  ramPct,    ramPct + '%');
    setCard('temp-val', 'temp-bar', tempPct,   d.temp + '°C');
    setCard('disk-val', 'disk-bar', d.disk_pct, d.disk_pct + '%');

    document.getElementById('ram-sub').textContent  = Math.round(d.ram_used) + ' / ' + Math.round(d.ram_total) + ' МБ';
    document.getElementById('disk-sub').textContent = 'свободно: ' + d.disk_free;

    const up = document.getElementById('uptime-val');
    up.textContent = fmtUptime(d.uptime_sec);
    up.classList.remove('skeleton');

    const ch = document.getElementById('checked-val');
    ch.textContent = fmtTime(d.timestamp);
    ch.classList.remove('skeleton');

    document.getElementById('status-dot').className = 'online';
    document.getElementById('status-text').textContent = 'Онлайн';

  } catch(e) {
    document.getElementById('status-dot').className = 'offline';
    document.getElementById('status-text').textContent = 'Офлайн';
  }
  cd = REFRESH;
}

setInterval(() => {
  cd--;
  document.getElementById('next-val').textContent = 'через ' + cd + ' с';
  if (cd <= 0) load();
}, 1000);

load();
</script>
</body>
</html>
