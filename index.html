<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Server Monitor</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0b1020;
            --card: rgba(20, 28, 48, 0.75);
            --border: rgba(255,255,255,0.08);
            --text: #f4f7ff;
            --muted: #97a2c7;

            --green: #4ade80;
            --blue: #60a5fa;
            --orange: #f59e0b;
            --red: #ef4444;
        }

        body {
            min-height: 100vh;
            font-family: Inter, Arial, sans-serif;
            background:
                radial-gradient(circle at top left, #1b2b57 0%, transparent 35%),
                radial-gradient(circle at bottom right, #12213f 0%, transparent 30%),
                var(--bg);

            color: var(--text);
            padding: 24px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .logo h1 {
            font-size: 2rem;
            font-weight: 800;
        }

        .logo span {
            color: var(--muted);
            font-size: 0.95rem;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 18px;
            border-radius: 999px;
            background: rgba(74, 222, 128, 0.08);
            border: 1px solid rgba(74, 222, 128, 0.18);
            color: var(--green);
            font-weight: 600;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 12px var(--green);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 18px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 22px;
            backdrop-filter: blur(14px);
            box-shadow:
                0 8px 30px rgba(0,0,0,0.35),
                inset 0 1px 0 rgba(255,255,255,0.03);
        }

        .label {
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 18px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .value {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 16px;
        }

        .sub {
            margin-top: 12px;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .bar {
            width: 100%;
            height: 10px;
            background: rgba(255,255,255,0.06);
            border-radius: 999px;
            overflow: hidden;
        }

        .fill {
            height: 100%;
            border-radius: 999px;
            transition: width 0.5s ease;
        }

        .green {
            color: var(--green);
        }

        .green-bg {
            background: linear-gradient(90deg, #22c55e, #4ade80);
        }

        .blue {
            color: var(--blue);
        }

        .blue-bg {
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
        }

        .orange {
            color: var(--orange);
        }

        .orange-bg {
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
        }

        .red {
            color: var(--red);
        }

        .red-bg {
            background: linear-gradient(90deg, #dc2626, #ef4444);
        }

        .bottom {
            margin-top: 18px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 18px;
        }

        .mini-title {
            color: var(--muted);
            font-size: 0.85rem;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .mini-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        footer {
            margin-top: 30px;
            text-align: center;
            color: var(--muted);
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            body {
                padding: 14px;
            }

            .value {
                font-size: 2.4rem;
            }

            .logo h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <div class="topbar">
        <div class="logo">
            <h1>NodePulse</h1>
            <span>Live server monitoring</span>
        </div>

        <div class="status">
            <div class="status-dot"></div>
            Сервер онлайн
        </div>
    </div>

    <div class="grid">

        <div class="card">
            <div class="label">Процессор</div>
            <div id="cpu" class="value green">0%</div>

            <div class="bar">
                <div id="cpuBar" class="fill green-bg" style="width:0%"></div>
            </div>

            <div class="sub">нагрузка CPU</div>
        </div>

        <div class="card">
            <div class="label">Оперативная память</div>
            <div id="ram" class="value blue">0%</div>

            <div class="bar">
                <div id="ramBar" class="fill blue-bg" style="width:0%"></div>
            </div>

            <div id="ramText" class="sub">0 / 0 MB</div>
        </div>

        <div class="card">
            <div class="label">Температура</div>
            <div id="temp" class="value orange">0°C</div>

            <div class="bar">
                <div id="tempBar" class="fill orange-bg" style="width:0%"></div>
            </div>

            <div class="sub">температура CPU</div>
        </div>

        <div class="card">
            <div class="label">Диск</div>
            <div id="disk" class="value red">0%</div>

            <div class="bar">
                <div id="diskBar" class="fill red-bg" style="width:0%"></div>
            </div>

            <div id="diskText" class="sub">свободно: 0 GB</div>
        </div>

    </div>

    <div class="bottom">

        <div class="card">
            <div class="mini-title">Аптайм</div>
            <div id="uptime" class="mini-value">—</div>
        </div>

        <div class="card">
            <div class="mini-title">Последнее обновление</div>
            <div id="updated" class="mini-value">—</div>
        </div>

        <div class="card">
            <div class="mini-title">Следующее обновление</div>
            <div id="nextUpdate" class="mini-value">120 сек</div>
        </div>

    </div>

    <footer>
        stats.json обновляется через GitHub API
    </footer>

</div>

<script>
    const UPDATE_INTERVAL = 120;

    let countdown = UPDATE_INTERVAL;

    async function loadStats() {
        try {

            // cache-busting чтобы GitHub Pages не кэшировал json
            const response = await fetch(`stats.json?t=${Date.now()}`);

            const data = await response.json();

            updateUI(data);

            countdown = UPDATE_INTERVAL;

        } catch (err) {
            console.error("Ошибка загрузки stats.json", err);
        }
    }

    function updateUI(data) {

        // CPU
        setValue("cpu", `${data.cpu}%`);
        setWidth("cpuBar", data.cpu);

        // RAM
        setValue("ram", `${data.ram_percent}%`);
        setWidth("ramBar", data.ram_percent);
        setValue(
            "ramText",
            `${data.ram_used} / ${data.ram_total} MB`
        );

        // TEMP
        setValue("temp", `${data.temperature}°C`);
        setWidth("tempBar", Math.min(data.temperature, 100));

        // DISK
        setValue("disk", `${data.disk_percent}%`);
        setWidth("diskBar", data.disk_percent);
        setValue(
            "diskText",
            `свободно: ${data.disk_free} GB`
        );

        // INFO
        setValue("uptime", data.uptime);
        setValue("updated", data.last_update);
    }

    function setValue(id, value) {
        document.getElementById(id).textContent = value;
    }

    function setWidth(id, value) {
        document.getElementById(id).style.width = value + "%";
    }

    // countdown
    setInterval(() => {

        countdown--;

        if (countdown <= 0) {
            countdown = UPDATE_INTERVAL;
        }

        document.getElementById("nextUpdate").textContent =
            `${countdown} сек`;

    }, 1000);

    // first load
    loadStats();

    // auto reload
    setInterval(loadStats, UPDATE_INTERVAL * 1000);
</script>

</body>
</html>
