<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ARM Monitor</title>

<style>
:root{
    --bg:#0b1020;
    --panel:#121a2f;
    --panel2:#18223d;
    --text:#edf2ff;
    --muted:#8ea2c9;
    --accent:#6ea8ff;
    --green:#2ecc71;
    --yellow:#f1c40f;
    --red:#ff5c7a;
    --shadow:0 10px 30px rgba(0,0,0,.35);
    --radius:22px;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Inter,system-ui,sans-serif;
    background:
        radial-gradient(circle at top left,#1c2952 0%,transparent 35%),
        radial-gradient(circle at bottom right,#10203d 0%,transparent 35%),
        var(--bg);
    color:var(--text);
    min-height:100vh;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:32px 18px 40px;
}

.topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
    margin-bottom:28px;
}

.title-wrap h1{
    margin:0;
    font-size:clamp(28px,4vw,42px);
    font-weight:800;
    letter-spacing:-1px;
}

.title-wrap p{
    margin:8px 0 0;
    color:var(--muted);
}

.actions{
    display:flex;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
}

.status{
    display:flex;
    align-items:center;
    gap:10px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.06);
    padding:12px 16px;
    border-radius:999px;
    backdrop-filter:blur(10px);
}

.dot{
    width:12px;
    height:12px;
    border-radius:50%;
    background:var(--green);
    box-shadow:0 0 14px var(--green);
}

.dot.offline{
    background:var(--red);
    box-shadow:0 0 14px var(--red);
}

.refresh-btn{
    border:none;
    cursor:pointer;
    border-radius:999px;
    padding:12px 18px;
    background:linear-gradient(135deg,#6ea8ff,#7d7bff);
    color:white;
    font-weight:700;
    transition:.2s transform,.2s opacity;
}

.refresh-btn:hover{
    transform:translateY(-2px);
}

.refresh-btn:active{
    transform:translateY(1px);
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:18px;
}

.card{
    background:linear-gradient(180deg,var(--panel),var(--panel2));
    border-radius:var(--radius);
    padding:22px;
    box-shadow:var(--shadow);
    position:relative;
    overflow:hidden;
}

.card::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(120deg,rgba(255,255,255,.06),transparent 50%);
    pointer-events:none;
}

.label{
    color:var(--muted);
    font-size:14px;
    margin-bottom:16px;
}

.value{
    font-size:42px;
    font-weight:800;
    line-height:1;
    letter-spacing:-1px;
}

.sub{
    margin-top:10px;
    color:var(--muted);
    font-size:14px;
}

.progress{
    width:100%;
    height:10px;
    border-radius:999px;
    background:rgba(255,255,255,.08);
    margin-top:18px;
    overflow:hidden;
}

.progress-bar{
    height:100%;
    width:0%;
    border-radius:999px;
    transition:width .4s ease;
}

.cpu-bar{ background:linear-gradient(90deg,#4facfe,#00f2fe);}
.ram-bar{ background:linear-gradient(90deg,#43e97b,#38f9d7);}
.disk-bar{ background:linear-gradient(90deg,#fa709a,#fee140);}
.temp-bar{ background:linear-gradient(90deg,#ff9966,#ff5e62);}

.footer{
    margin-top:28px;
    display:flex;
    justify-content:space-between;
    gap:12px;
    flex-wrap:wrap;
    color:var(--muted);
    font-size:14px;
}

.big-card{
    margin-top:18px;
    padding:28px;
}

.clock{
    font-size:clamp(42px,7vw,82px);
    font-weight:900;
    letter-spacing:-3px;
    margin-top:10px;
}

.countdown{
    margin-top:14px;
    display:inline-flex;
    align-items:center;
    gap:10px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    padding:12px 16px;
    border-radius:999px;
}

.pulse{
    width:10px;
    height:10px;
    border-radius:50%;
    background:var(--accent);
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);opacity:1}
    50%{transform:scale(1.6);opacity:.4}
    100%{transform:scale(1);opacity:1}
}

@media (max-width:700px){
    .value{
        font-size:34px;
    }

    .card{
        padding:18px;
    }

    .big-card{
        padding:22px;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="topbar">
        <div class="title-wrap">
            <h1>ARM Server Monitor</h1>
            <p>Live telemetry dashboard</p>
        </div>

        <div class="actions">
            <div class="status">
                <div class="dot" id="statusDot"></div>
                <span id="statusText">Online</span>
            </div>

            <button class="refresh-btn" id="refreshBtn">
                Refresh Now
            </button>
        </div>
    </div>

    <div class="grid">

        <div class="card">
            <div class="label">CPU Load</div>
            <div class="value" id="cpuValue">--%</div>

            <div class="progress">
                <div class="progress-bar cpu-bar" id="cpuBar"></div>
            </div>

            <div class="sub">Processor utilization</div>
        </div>

        <div class="card">
            <div class="label">Memory Usage</div>
            <div class="value" id="ramValue">-- MB</div>

            <div class="progress">
                <div class="progress-bar ram-bar" id="ramBar"></div>
            </div>

            <div class="sub" id="ramSub">-- / -- MB</div>
        </div>

        <div class="card">
            <div class="label">Temperature</div>
            <div class="value" id="tempValue">--°C</div>

            <div class="progress">
                <div class="progress-bar temp-bar" id="tempBar"></div>
            </div>

            <div class="sub">Thermal status</div>
        </div>

        <div class="card">
            <div class="label">Disk Usage</div>
            <div class="value" id="diskValue">--%</div>

            <div class="progress">
                <div class="progress-bar disk-bar" id="diskBar"></div>
            </div>

            <div class="sub" id="diskSub">Free: --</div>
        </div>

    </div>

    <div class="card big-card">
        <div class="label">System Uptime</div>
        <div class="clock" id="uptimeValue">--</div>

        <div class="countdown">
            <div class="pulse"></div>
            <span id="countdownText">Next refresh in 120s</span>
        </div>
    </div>

    <div class="footer">
        <div id="lastUpdate">
            Last update: --
        </div>

        <div id="serverTime">
            Server timestamp: --
        </div>
    </div>

</div>

<script>
const URL = "https://raw.githubusercontent.com/AlwaysWaffle/arm-monitor/main/stats.json";

const cpuValue = document.getElementById("cpuValue");
const ramValue = document.getElementById("ramValue");
const tempValue = document.getElementById("tempValue");
const diskValue = document.getElementById("diskValue");

const ramSub = document.getElementById("ramSub");
const diskSub = document.getElementById("diskSub");

const cpuBar = document.getElementById("cpuBar");
const ramBar = document.getElementById("ramBar");
const tempBar = document.getElementById("tempBar");
const diskBar = document.getElementById("diskBar");

const uptimeValue = document.getElementById("uptimeValue");
const lastUpdate = document.getElementById("lastUpdate");
const serverTime = document.getElementById("serverTime");

const statusDot = document.getElementById("statusDot");
const statusText = document.getElementById("statusText");

const countdownText = document.getElementById("countdownText");
const refreshBtn = document.getElementById("refreshBtn");

let countdown = 120;

function formatUptime(sec){
    const days = Math.floor(sec / 86400);
    const hours = Math.floor((sec % 86400) / 3600);
    const mins = Math.floor((sec % 3600) / 60);

    const parts = [];

    if(days) parts.push(days + "d");
    if(hours) parts.push(hours + "h");
    parts.push(mins + "m");

    return parts.join(" ");
}

function setOnline(isOnline){
    statusDot.classList.toggle("offline", !isOnline);
    statusText.textContent = isOnline ? "Online" : "Offline";
}

async function loadStats(){
    try{
        refreshBtn.disabled = true;
        refreshBtn.textContent = "Loading...";

        const response = await fetch(URL + "?t=" + Date.now());

        if(!response.ok){
            throw new Error("HTTP " + response.status);
        }

        const data = await response.json();

        cpuValue.textContent = data.cpu + "%";
        cpuBar.style.width = data.cpu + "%";

        const ramPct = (data.ram_used / data.ram_total) * 100;

        ramValue.textContent = data.ram_used + " MB";
        ramSub.textContent = `${data.ram_used} / ${data.ram_total} MB`;
        ramBar.style.width = ramPct + "%";

        tempValue.textContent = data.temp + "°C";
        tempBar.style.width = Math.min(data.temp,100) + "%";

        diskValue.textContent = data.disk_pct + "%";
        diskSub.textContent = "Free: " + data.disk_free;
        diskBar.style.width = data.disk_pct + "%";

        uptimeValue.textContent = formatUptime(data.uptime_sec);

        const now = new Date();

        lastUpdate.textContent =
            "Last update: " + now.toLocaleString();

        serverTime.textContent =
            "Server timestamp: " +
            new Date(data.timestamp * 1000).toLocaleString();

        setOnline(true);

        countdown = 120;
    }
    catch(err){
        console.error(err);

        setOnline(false);

        lastUpdate.textContent =
            "Last update failed: " + new Date().toLocaleTimeString();
    }
    finally{
        refreshBtn.disabled = false;
        refreshBtn.textContent = "Refresh Now";
    }
}

refreshBtn.addEventListener("click", loadStats);

setInterval(() => {
    countdown--;

    if(countdown <= 0){
        loadStats();
    }

    countdownText.textContent =
        `Next refresh in ${countdown}s`;
}, 1000);

loadStats();
</script>

</body>
</html>
