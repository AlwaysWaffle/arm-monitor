<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>arm monitor</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root {
  --bg: #080810;
  --s1: #0f0f1a;
  --s2: #16162a;
  --pink: #ff6b9d;
  --cyan: #00e5ff;
  --purple: #b388ff;
  --text: #f0f0ff;
  --muted: #4a4a6a;
  --border: rgba(255,255,255,0.06);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  padding: 32px 20px 60px;
}

.wrap { max-width: 820px; margin: 0 auto; }

header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 48px;
}

.title {
  font-size: clamp(2rem, 6vw, 3.5rem);
  font-weight: 900;
  letter-spacing: -0.04em;
  line-height: 0.9;
  color: var(--text);
}

.title em {
  font-style: normal;
  color: var(--pink);
}

.live {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.7rem;
  font-family: 'Space Mono', monospace;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding-bottom: 6px;
}

.live-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--pink);
  animation: blink 1.8s ease-in-out infinite;
}

.live-dot.dead { background: var(--muted); animation: none; }

@keyframes blink {
  0%,100%{ opacity:1; transform:scale(1); }
  50%{ opacity:0.3; transform:scale(0.7); }
}

/* Big stat cards */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-bottom: 12px;
}

.stats-grid-3 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 12px;
}

.card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px 24px 24px;
  position: relative;
  overflow: hidden;
  transition: transform 0.2s, border-color 0.2s;
}

.card:hover {
  transform: translateY(-2px);
  border-color: rgba(255,255,255,0.12);
}

.card-accent {
  position: absolute;
  top: 0; left: 24px;
  width: 40px; height: 2px;
  border-radius: 0 0 4px 4px;
}

.card-label {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--muted);
  margin-bottom: 16px;
  font-family: 'Space Mono', monospace;
}

.card-num {
  font-size: clamp(2.4rem, 5vw, 3.2rem);
  font-weight: 900;
  letter-spacing: -0.04em;
  line-height: 1;
  margin-bottom: 4px;
  transition: color 0.5s;
}

.card-unit {
  font-size: 1rem;
  font-weight: 300;
  opacity: 0.5;
  margin-left: 2px;
}

.card-sub {
  font-size: 0.72rem;
  color: var(--muted);
  margin-top: 10px;
  font-family: 'Space Mono', monospace;
}

/* Arc progress */
.arc-wrap {
  position: absolute;
  bottom: 20px; right: 20px;
  width: 52px; height: 52px;
}

.arc-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }

.arc-bg { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 4; }
.arc-fg { fill: none; stroke-width: 4; stroke-linecap: round;
  transition: stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1), stroke 0.5s; }

/* Color classes */
.c-pink  { color: var(--pink); }
.c-cyan  { color: var(--cyan); }
.c-purple{ color: var(--purple); }
.c-warn  { color: #ffb74d; }
.c-danger{ color: #ff5252; }

.acc-pink   { background: var(--pink); }
.acc-cyan   { background: var(--cyan); }
.acc-purple { background: var(--purple); }

.arc-pink   { stroke: var(--pink); }
.arc-cyan   { stroke: var(--cyan); }
.arc-purple { stroke: var(--purple); }
.arc-warn   { stroke: #ffb74d; }
.arc-danger { stroke: #ff5252; }

/* Uptime card */
.uptime-row {
  display: flex;
  gap: 28px;
  align-items: baseline;
  flex-wrap: wrap;
}

.up-item {}
.up-num {
  font-size: 2rem;
  font-weight: 900;
  letter-spacing: -0.04em;
  color: var(--cyan);
}
.up-lbl {
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--muted);
  font-family: 'Space Mono', monospace;
  margin-top: 2px;
}

/* Footer */
footer {
  margin-top: 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
}

.footer-info {
  font-size: 0.65rem;
  font-family: 'Space Mono', monospace;
  color: var(--muted);
  line-height: 1.8;
}

.footer-info span { color: var(--pink); }

.refresh-btn {
  background: var(--s2);
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 10px 20px;
  border-radius: 100px;
  cursor: pointer;
  transition: all 0.2s;
}

.refresh-btn:hover { border-color: var(--pink); color: var(--pink); }

/* Skeleton */
@keyframes shimmer {
  0%{ opacity:0.3 } 50%{ opacity:0.7 } 100%{ opacity:0.3 }
}
.skel { animation: shimmer 1.5s ease infinite; }

@media(max-width: 520px) {
  .stats-grid, .stats-grid-3 { grid-template-columns: 1fr 1fr; }
  .card-num { font-size: 2rem; }
}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="title">arm<br><em>monitor</em></div>
    <div class="live">
      <div class="live-dot" id="liveDot"></div>
      <span id="liveText">загрузка</span>
    </div>
  </header>

  <div class="stats-grid">
    <!-- CPU -->
    <div class="card">
      <div class="card-accent acc-pink"></div>
      <div class="card-label">процессор</div>
      <div class="card-num c-pink skel" id="cpuVal">—<span class="card-unit">%</span></div>
      <div class="card-sub" id="cpuSub">нагрузка</div>
      <div class="arc-wrap">
        <svg viewBox="0 0 52 52">
          <circle class="arc-bg" cx="26" cy="26" r="22"/>
          <circle class="arc-fg arc-pink" id="cpuArc" cx="26" cy="26" r="22"
            stroke-dasharray="138.2" stroke-dashoffset="138.2"/>
        </svg>
      </div>
    </div>

    <!-- RAM -->
    <div class="card">
      <div class="card-accent acc-cyan"></div>
      <div class="card-label">память</div>
      <div class="card-num c-cyan skel" id="ramVal">—<span class="card-unit">%</span></div>
      <div class="card-sub" id="ramSub">—</div>
      <div class="arc-wrap">
        <svg viewBox="0 0 52 52">
          <circle class="arc-bg" cx="26" cy="26" r="22"/>
          <circle class="arc-fg arc-cyan" id="ramArc" cx="26" cy="26" r="22"
            stroke-dasharray="138.2" stroke-dashoffset="138.2"/>
        </svg>
      </div>
    </div>
  </div>

  <div class="stats-grid-3">
    <!-- Temp -->
    <div class="card">
      <div class="card-accent acc-purple"></div>
      <div class="card-label">температура</div>
      <div class="card-num c-purple skel" id="tempVal">—<span class="card-unit">°</span></div>
      <div class="card-sub">CPU</div>
      <div class="arc-wrap">
        <svg viewBox="0 0 52 52">
          <circle class="arc-bg" cx="26" cy="26" r="22"/>
          <circle class="arc-fg arc-purple" id="tempArc" cx="26" cy="26" r="22"
            stroke-dasharray="138.2" stroke-dashoffset="138.2"/>
        </svg>
      </div>
    </div>

    <!-- Disk -->
    <div class="card">
      <div class="card-accent acc-pink"></div>
      <div class="card-label">диск</div>
      <div class="card-num c-pink skel" id="diskVal">—<span class="card-unit">%</span></div>
      <div class="card-sub" id="diskSub">свободно: —</div>
      <div class="arc-wrap">
        <svg viewBox="0 0 52 52">
          <circle class="arc-bg" cx="26" cy="26" r="22"/>
          <circle class="arc-fg arc-pink" id="diskArc" cx="26" cy="26" r="22"
            stroke-dasharray="138.2" stroke-dashoffset="138.2"/>
        </svg>
      </div>
    </div>

    <!-- Uptime -->
    <div class="card">
      <div class="card-accent acc-cyan"></div>
      <div class="card-label">аптайм</div>
      <div class="uptime-row" style="margin-top:8px">
        <div class="up-item">
          <div class="up-num skel" id="uptD">—</div>
          <div class="up-lbl">дн</div>
        </div>
        <div class="up-item">
          <div class="up-num skel" id="uptH">—</div>
          <div class="up-lbl">ч</div>
        </div>
        <div class="up-item">
          <div class="up-num skel" id="uptM">—</div>
          <div class="up-lbl">мин</div>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <div class="footer-info">
      <div>обновлено: <span id="lastUpd">—</span></div>
      <div>следующее через <span id="cd">120</span> сек</div>
    </div>
    <button class="refresh-btn" onclick="load()">↻ refresh</button>
  </footer>

</div>
<script>
const REPO = 'AlwaysWaffle/arm-monitor';
const CIRC = 138.2;
let cd = 120, timer;

function arc(id, pct, warn, danger) {
  const el = document.getElementById(id);
  const offset = CIRC * (1 - Math.min(pct, 100) / 100);
  el.style.strokeDashoffset = offset;
  el.className = 'arc-fg ' + (pct >= danger ? 'arc-danger' : pct >= warn ? 'arc-warn' : el.className.split(' ').pop());
}

function numColor(el, val, warn, danger) {
  const base = el.dataset.base;
  el.className = el.className.replace(/c-\S+/, val >= danger ? 'c-danger' : val >= warn ? 'c-warn' : ('c-' + base));
}

function setNum(id, val, unit) {
  const el = document.getElementById(id);
  el.classList.remove('skel');
  el.innerHTML = val + '<span class="card-unit">' + unit + '</span>';
}

async function load() {
  try {
    const r = await fetch(`https://raw.githubusercontent.com/${REPO}/main/stats.json?t=${Date.now()}`);
    if (!r.ok) throw 0;
    const d = await r.json();

    const ramPct = Math.round(d.ram_used / d.ram_total * 100);

    setNum('cpuVal', d.cpu, '%');
    setNum('ramVal', ramPct, '%');
    setNum('tempVal', d.temp, '°');
    setNum('diskVal', d.disk_pct, '%');

    arc('cpuArc', d.cpu, 70, 90);
    arc('ramArc', ramPct, 70, 90);
    arc('tempArc', d.temp / 100 * 100, 65, 80);
    arc('diskArc', d.disk_pct, 70, 90);

    document.getElementById('ramSub').textContent = Math.round(d.ram_used) + ' / ' + Math.round(d.ram_total) + ' МБ';
    document.getElementById('diskSub').textContent = 'свободно: ' + d.disk_free;

    const s = d.uptime_sec;
    document.getElementById('uptD').textContent = Math.floor(s/86400);
    document.getElementById('uptH').textContent = Math.floor(s%86400/3600);
    document.getElementById('uptM').textContent = Math.floor(s%3600/60);
    ['uptD','uptH','uptM'].forEach(i => document.getElementById(i).classList.remove('skel'));

    const dt = new Date(d.timestamp * 1000);
    document.getElementById('lastUpd').textContent = dt.toLocaleTimeString('ru');

    document.getElementById('liveDot').className = 'live-dot';
    document.getElementById('liveText').textContent = 'онлайн';

  } catch(e) {
    document.getElementById('liveDot').className = 'live-dot dead';
    document.getElementById('liveText').textContent = 'офлайн';
  }
  cd = 120;
}

function tick() {
  cd--;
  document.getElementById('cd').textContent = cd;
  if (cd <= 0) load();
}

load();
timer = setInterval(tick, 1000);
</script>
</body>
</html>
